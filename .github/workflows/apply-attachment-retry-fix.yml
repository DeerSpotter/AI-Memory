name: Apply Attachment Retry Fix

on:
  push:
    branches:
      - codex/share-context-terminology

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/share-context-terminology
          fetch-depth: 0

      - name: Apply attachment verification and retry fix
        run: python3 scripts/apply_attachment_retry_fix.py

      - name: Verify patch shape
        run: |
          python3 - <<'PY'
          from pathlib import Path
          pending = Path('ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift').read_text()
          tab = Path('ChatGPTWebView/Web/ChatGPTTabView.swift').read_text()
          assert 'bridge.files.every((record)' in pending
          assert 'bridge.files.some((record)' not in pending
          assert 'pendingAttachFileURLs = urls' in tab
          assert 'The files are still ready; tap Attach Files to retry.' in tab
          PY

      - name: Commit patch and remove temporary patch machinery
        run: |
          rm -f scripts/apply_attachment_retry_fix.py
          rm -f .github/workflows/apply-attachment-retry-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift ChatGPTWebView/Web/ChatGPTTabView.swift scripts/apply_attachment_retry_fix.py .github/workflows/apply-attachment-retry-fix.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "keep failed context attachments retryable"
          git push origin HEAD:codex/share-context-terminology
