name: Apply Build 70 State Fixes

on:
  push:
    branches:
      - codex/add-deepseek-provider
    paths:
      - ".github/workflows/apply-build70-patch.yml"

permissions:
  contents: write

jobs:
  apply-build70-state-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/add-deepseek-provider
          fetch-depth: 0

      - name: Decode and apply validated patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          payload = """"""
          patch = gzip.decompress(base64.b64decode(payload))
          Path("/tmp/contextport-build70.patch").write_bytes(patch)
          PY
          git apply --check /tmp/contextport-build70.patch
          git apply /tmp/contextport-build70.patch

      - name: Validate patched source markers
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'source-fingerprint:' ChatGPTWebView/Developer/DeveloperSourceMemoryArchive.swift
          grep -q 'store.deleteEntry(saved.entry)' ChatGPTWebView/Developer/DeveloperSourceMemoryArchive.swift
          grep -q 'Saved to Memory' ChatGPTWebView/Developer/DeveloperSourcesView.swift
          grep -q 'ChatAttachmentHandoffResult' ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift
          grep -q "getAttribute('accept')" ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift
          grep -q 'handoff.failedURLs' ChatGPTWebView/Web/ChatGPTTabView.swift
          grep -q 'CURRENT_PROJECT_VERSION: "70"' project.yml
          git diff --check

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-build70-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix developer source save and attachment state"
          git push origin HEAD:codex/add-deepseek-provider
