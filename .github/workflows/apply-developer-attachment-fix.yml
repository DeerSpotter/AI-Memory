name: Apply Developer Attachment Fix

on:
  push:
    branches:
      - codex/share-context-terminology

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/share-context-terminology
          fetch-depth: 0

      - name: Apply developer attachment fix
        run: python3 scripts/apply_developer_attachment_fix.py

      - name: Verify patch shape
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift')
          text = path.read_text()
          assert '18_000_000' not in text
          assert '__contextPortUploadBridge' in text
          assert 'read(upToCount: uploadChunkSize)' in text
          assert 'attachmentVisible' in text
          PY

      - name: Commit patch and remove temporary patch machinery
        run: |
          rm -f scripts/apply_developer_attachment_fix.py
          rm -f .github/workflows/apply-developer-attachment-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChatGPTWebView/Web/ChatGPTWebViewPendingUploads.swift scripts/apply_developer_attachment_fix.py .github/workflows/apply-developer-attachment-fix.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix large developer source attachments"
          git push origin HEAD:codex/share-context-terminology
