name: Build Grok OAuth Fix Test IPA

on:
  pull_request:
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-grok-oauth-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-grok-oauth-fix:
    name: Build Grok OAuth fix test IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Grok OAuth coordinator fix
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          source_path = Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift")
          source = source_path.read_text()

          old_popup_guard = '''        guard navigationAction.targetFrame == nil,
              let url = navigationAction.request.url else {
            return nil
        }

        if shouldUseProviderAuthPopup(url: url, openerURL: webView.url) {
'''
          fixed_popup_guard = '''        guard navigationAction.targetFrame == nil,
              let url = navigationAction.request.url else {
            return nil
        }

        // Keep nested OAuth target=_blank navigation in the existing auth popup.
        // Creating another full-screen popup here can leave a blank white layer.
        if isAuthPopup(webView) {
            webView.load(URLRequest(url: url))
            return nil
        }

        if shouldUseProviderAuthPopup(url: url, openerURL: webView.url) {
'''
          if fixed_popup_guard not in source:
              if old_popup_guard not in source:
                  raise SystemExit("Expected createWebViewWith popup guard was not found")
              source = source.replace(old_popup_guard, fixed_popup_guard, 1)

          duplicate_load = '''
        // On iOS, some Grok/xAI popup requests can create the child view before
        // WebKit commits the first navigation into it. Loading the initial request
        // explicitly keeps the overlay from remaining a blank white WKWebView.
        if provider.id == .grok {
            DispatchQueue.main.async { [weak popupWebView] in
                popupWebView?.load(URLRequest(url: initialURL))
            }
        }
'''
          if duplicate_load not in source:
              raise SystemExit("Expected duplicate Grok popup load block was not found")
          source = source.replace(duplicate_load, "", 1)

          source_path.write_text(source)
          PY

          grep -n -A12 -B4 "Keep nested OAuth" ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          if grep -q "explicitly keeps the overlay from remaining a blank white WKWebView" ChatGPTWebView/Web/ChatGPTWebViewStore.swift; then
            echo "Duplicate Grok popup load block still exists." >&2
            exit 23
          fi

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodegen generate
          test -f ChatGPTWebView.xcodeproj/project.pbxproj

      - name: Archive app without signing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild clean archive \
            -project ChatGPTWebView.xcodeproj \
            -scheme ChatGPTWebView \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTWebView.xcarchive" \
            IPHONEOS_DEPLOYMENT_TARGET="16.0" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ChatGPTWebView.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -n 1 || true)"
          if [ -z "$APP_PATH" ]; then
            echo "Archive completed but no .app was found under Products/Applications." >&2
            exit 22
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ChatGPT-WebView-grok-oauth-fix-ios16-unsigned.ipa Payload)
          ls -lh build/ChatGPT-WebView-grok-oauth-fix-ios16-unsigned.ipa

      - name: Upload Grok fix IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-grok-oauth-fix-ios16-unsigned-ipa
          path: build/ChatGPT-WebView-grok-oauth-fix-ios16-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-grok-oauth-patched-source
          path: |
            ChatGPTWebView/Web/ChatGPTWebViewStore.swift
            project.yml
          if-no-files-found: error
          retention-days: 14
