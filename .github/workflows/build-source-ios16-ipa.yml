name: Build Source iOS 16 IPA

on:
  push:
    branches:
      - main
      - phase2/supabase-memory-ui
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  pull_request:
    paths:
      - "ChatGPTWebView/**"
      - "AppMemory/**"
      - "project.yml"
      - ".github/workflows/build-source-ios16-ipa.yml"
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "Minimum iOS deployment target"
        required: false
        default: "16.0"

permissions:
  contents: write

jobs:
  patch-provider-oauth:
    name: Apply provider OAuth popup architecture
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/multi-ai-architecture'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/multi-ai-architecture
          fetch-depth: 0

      - name: Patch Claude and Grok OAuth WebKit handling
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Expected {label} was not found")
              return text.replace(old, new, 1)

          def update_section(text: str, start: str, end: str, old: str, new: str, label: str) -> str:
              start_index = text.find(start)
              if start_index < 0:
                  raise SystemExit(f"Expected {label} section start was not found")
              end_index = text.find(end, start_index)
              if end_index < 0:
                  raise SystemExit(f"Expected {label} section end was not found")
              section = text[start_index:end_index]
              if old not in section:
                  raise SystemExit(f"Expected {label} section pattern was not found")
              section = section.replace(old, new, 1)
              return text[:start_index] + section + text[end_index:]

          store_path = Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift")
          store = store_path.read_text()

          config_line = "        configuration.allowsInlineMediaPlayback = true\n"
          config_replacement = config_line + (
              "        if provider.id == .claude || provider.id == .grok {\n"
              "            configuration.preferences.javaScriptCanOpenWindowsAutomatically = true\n"
              "        }\n"
          )
          store = replace_once(store, config_line, config_replacement, "inline media configuration line")

          attach_anchor = "        self.webView = webView\n\n        coordinator.navigationDidFinishHandler = { [weak self] _ in\n"
          attach_replacement = (
              "        self.webView = webView\n\n"
              "        coordinator.providerAuthenticationDidCompleteHandler = { [weak self] in\n"
              "            Task { @MainActor [weak self] in\n"
              "                self?.handleProviderAuthenticationConfirmed()\n"
              "            }\n"
              "        }\n"
              "        coordinator.attachMainWebView(webView)\n\n"
              "        coordinator.navigationDidFinishHandler = { [weak self] _ in\n"
          )
          store = replace_once(store, attach_anchor, attach_replacement, "coordinator attachment anchor")

          logout_anchor = "    private func handleExplicitLogoutDetected() {\n"
          auth_method = (
              "    private func handleProviderAuthenticationConfirmed() {\n"
              "        explicitLogoutDetected = false\n"
              "        logoutNavigationGeneration = nil\n"
              "        didDetectDisplayName = false\n\n"
              "        if profile.kind != .guest {\n"
              "            sessionMutationGeneration += 1\n"
              "            browserStateVault.markActive(profileID: storageProfileID)\n"
              "        }\n\n"
              "        scheduleProfileStateCapture()\n"
              "    }\n\n"
              + logout_anchor
          )
          store = replace_once(store, logout_anchor, auth_method, "logout handler anchor")

          coordinator_marker = "final class SecureChatGPTWebViewCoordinator"
          if coordinator_marker not in store:
              raise SystemExit("Coordinator class marker was not found")
          prefix = store.split(coordinator_marker, 1)[0]

          coordinator = r'''final class SecureChatGPTWebViewCoordinator: NSObject, WKNavigationDelegate, WKUIDelegate, WKScriptMessageHandler, WKHTTPCookieStoreObserver {
              static let profileLogoutMessageName = "chatGPTProfileLogout"

              var navigationDidFinishHandler: ((WKWebView) -> Void)?
              var logoutDetectedHandler: (() -> Void)?
              var providerAuthenticationDidCompleteHandler: (() -> Void)?

              private let provider: AIProvider
              private let allowedHostSuffixes: [String]
              private weak var mainWebView: WKWebView?
              private weak var observedCookieStore: WKHTTPCookieStore?
              private var authPopupWebViews: [ObjectIdentifier: WKWebView] = [:]
              private var grokPopupsThatLeftProvider: Set<ObjectIdentifier> = []
              private var claudeSessionCookieSeen = false
              private let internalSchemes = [
                  "https",
                  "about",
                  "blob",
                  "data"
              ]
              private let externalSchemes = [
                  "http",
                  "https",
                  "mailto",
                  "tel",
                  "sms"
              ]

              init(provider: AIProvider = AIProviderID.chatGPT.provider) {
                  self.provider = provider
                  self.allowedHostSuffixes = provider.allowedHostSuffixes
                  super.init()
              }

              deinit {
                  observedCookieStore?.remove(self)
              }

              func attachMainWebView(_ webView: WKWebView) {
                  mainWebView = webView

                  let cookieStore = webView.configuration.websiteDataStore.httpCookieStore
                  if observedCookieStore !== cookieStore {
                      observedCookieStore?.remove(self)
                      observedCookieStore = cookieStore
                      cookieStore.add(self)
                  }

                  if provider.id == .claude {
                      inspectClaudeSessionCookie(in: cookieStore)
                  }
              }

              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  guard message.name == Self.profileLogoutMessageName else { return }
                  logoutDetectedHandler?()
              }

              func cookiesDidChange(in cookieStore: WKHTTPCookieStore) {
                  guard provider.id == .claude else { return }
                  inspectClaudeSessionCookie(in: cookieStore)
              }

              func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
                  if isAuthPopup(webView) {
                      trackAuthPopupNavigation(webView, url: webView.url)

                      if provider.id == .grok,
                         grokPopupsThatLeftProvider.contains(ObjectIdentifier(webView)),
                         isCompletedGrokReturnURL(webView.url) {
                          closeAuthPopup(webView)
                          completeProviderAuthentication()
                      }
                      return
                  }

                  navigationDidFinishHandler?(webView)
              }

              func webView(_ webView: WKWebView,
                           decidePolicyFor navigationAction: WKNavigationAction,
                           decisionHandler: @escaping (WKNavigationActionPolicy) -> Void) {
                  guard let url = navigationAction.request.url else {
                      decisionHandler(.cancel)
                      return
                  }

                  if isAuthPopup(webView) {
                      trackAuthPopupNavigation(webView, url: url)
                      decisionHandler(allowsAuthPopupURL(url) ? .allow : .cancel)
                      return
                  }

                  if navigationAction.targetFrame == nil,
                     shouldUseProviderAuthPopup(url: url, openerURL: webView.url) {
                      decisionHandler(.allow)
                      return
                  }

                  if navigationAction.targetFrame?.isMainFrame == false {
                      decisionHandler(allowsEmbeddedFrameURL(url) ? .allow : .cancel)
                      return
                  }

                  if isAllowedInsideWebView(url: url) {
                      decisionHandler(.allow)
                      return
                  }

                  if shouldOpenExternally(url: url, navigationAction: navigationAction) {
                      openExternally(url)
                  }

                  decisionHandler(.cancel)
              }

              func webView(_ webView: WKWebView,
                           createWebViewWith configuration: WKWebViewConfiguration,
                           for navigationAction: WKNavigationAction,
                           windowFeatures: WKWindowFeatures) -> WKWebView? {
                  guard navigationAction.targetFrame == nil,
                        let url = navigationAction.request.url else {
                      return nil
                  }

                  if shouldUseProviderAuthPopup(url: url, openerURL: webView.url) {
                      return createAuthPopupWebView(configuration: configuration, opener: webView, initialURL: url)
                  }

                  if isAllowedInsideWebView(url: url) {
                      webView.load(URLRequest(url: url))
                  } else if shouldOpenExternally(url: url, navigationAction: navigationAction) {
                      openExternally(url)
                  }

                  return nil
              }

              func webViewDidClose(_ webView: WKWebView) {
                  guard isAuthPopup(webView) else { return }

                  let popupID = ObjectIdentifier(webView)
                  let completedGrokAuth = provider.id == .grok
                      && grokPopupsThatLeftProvider.contains(popupID)

                  closeAuthPopup(webView)

                  if completedGrokAuth {
                      completeProviderAuthentication()
                  }
              }

              private func createAuthPopupWebView(
                  configuration: WKWebViewConfiguration,
                  opener: WKWebView,
                  initialURL: URL
              ) -> WKWebView {
                  configuration.preferences.javaScriptCanOpenWindowsAutomatically = true

                  let popupWebView = WKWebView(frame: .zero, configuration: configuration)
                  popupWebView.navigationDelegate = self
                  popupWebView.uiDelegate = self
                  popupWebView.allowsBackForwardNavigationGestures = true
                  popupWebView.scrollView.keyboardDismissMode = .interactive
                  popupWebView.customUserAgent = opener.customUserAgent
                  popupWebView.backgroundColor = .systemBackground
                  popupWebView.isOpaque = true

                  let hostView = mainWebView ?? opener
                  popupWebView.frame = hostView.bounds
                  popupWebView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  hostView.addSubview(popupWebView)

                  let popupID = ObjectIdentifier(popupWebView)
                  authPopupWebViews[popupID] = popupWebView
                  trackAuthPopupNavigation(popupWebView, url: initialURL)

                  return popupWebView
              }

              private func closeAuthPopup(_ webView: WKWebView) {
                  let popupID = ObjectIdentifier(webView)
                  webView.stopLoading()
                  webView.navigationDelegate = nil
                  webView.uiDelegate = nil
                  webView.removeFromSuperview()
                  authPopupWebViews.removeValue(forKey: popupID)
                  grokPopupsThatLeftProvider.remove(popupID)
              }

              private func completeProviderAuthentication() {
                  providerAuthenticationDidCompleteHandler?()

                  guard let mainWebView else { return }
                  mainWebView.stopLoading()
                  mainWebView.load(URLRequest(url: provider.startURL))
              }

              private func inspectClaudeSessionCookie(in cookieStore: WKHTTPCookieStore) {
                  guard provider.id == .claude, !claudeSessionCookieSeen else { return }

                  cookieStore.getAllCookies { [weak self] cookies in
                      guard let self else { return }

                      let hasClaudeSession = cookies.contains { cookie in
                          let domain = cookie.domain
                              .trimmingCharacters(in: CharacterSet(charactersIn: "."))
                              .lowercased()
                          return cookie.name == "sessionKey"
                              && (domain == "claude.ai" || domain.hasSuffix(".claude.ai"))
                              && cookie.value.hasPrefix("sk-ant-sid01")
                      }

                      guard hasClaudeSession else { return }

                      DispatchQueue.main.async { [weak self] in
                          guard let self, !self.claudeSessionCookieSeen else { return }
                          self.claudeSessionCookieSeen = true

                          let popups = Array(self.authPopupWebViews.values)
                          for popup in popups {
                              self.closeAuthPopup(popup)
                          }

                          self.completeProviderAuthentication()
                      }
                  }
              }

              private func shouldUseProviderAuthPopup(url: URL, openerURL: URL?) -> Bool {
                  guard let host = url.host?.lowercased() else { return false }
                  let openerPath = openerURL?.path.lowercased() ?? ""

                  switch provider.id {
                  case .claude:
                      let authHost = host == "accounts.google.com"
                          || host == "appleid.apple.com"
                          || host == "login.microsoftonline.com"
                          || host == "accounts.anthropic.com"
                          || host.hasSuffix(".workos.com")
                          || host.hasSuffix(".auth0.com")
                      return authHost || openerPath.hasPrefix("/login") || openerPath.hasPrefix("/auth")

                  case .grok:
                      let authHost = host == "accounts.x.ai"
                          || host == "x.com"
                          || host == "accounts.google.com"
                          || host == "appleid.apple.com"
                      return authHost
                          || openerPath.hasPrefix("/sign-in")
                          || openerPath.hasPrefix("/signin")
                          || openerPath.hasPrefix("/login")
                          || openerPath.hasPrefix("/auth")

                  default:
                      return false
                  }
              }

              private func trackAuthPopupNavigation(_ webView: WKWebView, url: URL?) {
                  guard provider.id == .grok,
                        isAuthPopup(webView),
                        let url,
                        !isGrokURL(url) else {
                      return
                  }

                  grokPopupsThatLeftProvider.insert(ObjectIdentifier(webView))
              }

              private func isCompletedGrokReturnURL(_ url: URL?) -> Bool {
                  guard let url, isGrokURL(url) else { return false }
                  let path = url.path.lowercased()
                  return !path.hasPrefix("/sign-in")
                      && !path.hasPrefix("/signin")
                      && !path.hasPrefix("/login")
                      && !path.hasPrefix("/auth")
              }

              private func isGrokURL(_ url: URL) -> Bool {
                  guard let host = url.host?.lowercased() else { return false }
                  return host == "grok.com" || host.hasSuffix(".grok.com")
              }

              private func isAuthPopup(_ webView: WKWebView) -> Bool {
                  authPopupWebViews[ObjectIdentifier(webView)] != nil
              }

              private func allowsAuthPopupURL(_ url: URL) -> Bool {
                  guard let scheme = url.scheme?.lowercased() else { return false }
                  return scheme == "http"
                      || scheme == "https"
                      || scheme == "about"
                      || scheme == "blob"
                      || scheme == "data"
              }

              private func allowsEmbeddedFrameURL(_ url: URL) -> Bool {
                  guard let scheme = url.scheme?.lowercased() else { return false }
                  return scheme == "https"
                      || scheme == "about"
                      || scheme == "blob"
                      || scheme == "data"
              }

              private func isAllowedInsideWebView(url: URL) -> Bool {
                  guard let scheme = url.scheme?.lowercased(), internalSchemes.contains(scheme) else {
                      return false
                  }

                  if scheme == "about" || scheme == "blob" || scheme == "data" {
                      return true
                  }

                  guard scheme == "https", let host = url.host?.lowercased() else {
                      return false
                  }

                  return allowedHostSuffixes.contains { suffix in
                      host == suffix || host.hasSuffix("." + suffix)
                  }
              }

              private func shouldOpenExternally(url: URL, navigationAction: WKNavigationAction) -> Bool {
                  guard let scheme = url.scheme?.lowercased(), externalSchemes.contains(scheme) else {
                      return false
                  }

                  if isAllowedInsideWebView(url: url) {
                      return false
                  }

                  return navigationAction.navigationType == .linkActivated
              }

              private func openExternally(_ url: URL) {
                  DispatchQueue.main.async {
                      UIApplication.shared.open(url, options: [:], completionHandler: nil)
                  }
              }

              @available(iOS 15.0, *)
              func webView(_ webView: WKWebView,
                           requestMediaCapturePermissionFor origin: WKSecurityOrigin,
                           initiatedByFrame frame: WKFrameInfo,
                           type: WKMediaCaptureType,
                           decisionHandler: @escaping (WKPermissionDecision) -> Void) {
                  decisionHandler(.prompt)
              }
          }
          '''

          store_path.write_text(prefix + coordinator)

          provider_path = Path("ChatGPTWebView/App/AIProvider.swift")
          provider = provider_path.read_text()

          path_line = "        let path = url.path.lowercased()\n"
          auth_guard = (
              "        if id == .claude, host != \"claude.ai\" {\n"
              "            return false\n"
              "        }\n\n"
              + path_line
          )
          provider = replace_once(provider, path_line, auth_guard, "authenticated URL path line")

          provider = update_section(
              provider,
              "        .claude: AIProvider(",
              "        .gemini: AIProvider(",
              '                "live.com"\n',
              '                "live.com",\n                "challenges.cloudflare.com"\n',
              "Claude allowed hosts"
          )
          provider = update_section(
              provider,
              "        .grok: AIProvider(",
              "    ]\n}",
              '                "icloud.com"\n',
              '                "icloud.com",\n                "challenges.cloudflare.com"\n',
              "Grok allowed hosts"
          )
          provider_path.write_text(provider)

          project_path = Path("project.yml")
          project = project_path.read_text()
          project = replace_once(
              project,
              'CURRENT_PROJECT_VERSION: "28"',
              'CURRENT_PROJECT_VERSION: "29"',
              "build 28 version line"
          )
          project_path.write_text(project)

      - name: Verify patch shape
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -F 'configuration.preferences.javaScriptCanOpenWindowsAutomatically = true' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'WKHTTPCookieStoreObserver' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'cookie.name == "sessionKey"' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'return createAuthPopupWebView(configuration: configuration, opener: webView, initialURL: url)' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'if id == .claude, host != "claude.ai"' ChatGPTWebView/App/AIProvider.swift
          grep -F 'CURRENT_PROJECT_VERSION: "29"' project.yml

      - name: Restore workflow, remove temporary runner, and commit source patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout 45f0cd2d12a5cb8fc61d25966a5a3e00f10b4216 -- .github/workflows/build-source-ios16-ipa.yml
          git rm -f .github/workflows/patch-provider-oauth-popups.yml
          git add ChatGPTWebView/Web/ChatGPTWebViewStore.swift ChatGPTWebView/App/AIProvider.swift project.yml .github/workflows/build-source-ios16-ipa.yml
          git commit -m "Preserve provider OAuth popup sessions"
          git push origin HEAD:codex/multi-ai-architecture

  build-source-ios16-ipa:
    name: Build source controlled iOS 16 unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodegen generate
          test -f ChatGPTWebView.xcodeproj/project.pbxproj

      - name: Archive app without signing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          DEPLOYMENT_TARGET="${{ github.event.inputs.deployment_target || '16.0' }}"

          xcodebuild clean archive \
            -project ChatGPTWebView.xcodeproj \
            -scheme ChatGPTWebView \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTWebView.xcarchive" \
            IPHONEOS_DEPLOYMENT_TARGET="$DEPLOYMENT_TARGET" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ChatGPTWebView.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -n 1 || true)"

          if [ -z "$APP_PATH" ]; then
            echo "Archive completed but no .app was found under Products/Applications." >&2
            exit 22
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ChatGPT-WebView-phase2-ios16-unsigned.ipa Payload)
          ls -lh build/ChatGPT-WebView-phase2-ios16-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-phase2-ios16-unsigned-ipa
          path: build/ChatGPT-WebView-phase2-ios16-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload generated Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-WebView-phase2-generated-xcode-project
          path: |
            ChatGPTWebView.xcodeproj
            project.yml
            ChatGPTWebView
            AppMemory
          if-no-files-found: error
          retention-days: 14
