name: Patch Provider Auth Isolation

on:
  push:
    branches:
      - codex/multi-ai-architecture
    paths:
      - ".github/workflows/patch-provider-auth-isolation.yml"

permissions:
  contents: write

jobs:
  patch-auth-isolation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/multi-ai-architecture
          fetch-depth: 0

      - name: Patch provider auth isolation and routing
        shell: python
        run: |
          from pathlib import Path

          store_path = Path("ChatGPTWebView/Web/ChatGPTWebViewStore.swift")
          store = store_path.read_text()

          old_restore = '''        let restoredURL = isPersistentProfile && shouldRestorePersistentSession
              ? browserStateVault.lastURL(
                  profileID: storageProfileID,
                  allowedHostSuffixes: provider.authenticatedHostSuffixes
              )
              : nil
          self.initialURL = restoredURL ?? initialURL ?? provider.startURL

          let configuration = WKWebViewConfiguration()
          configuration.websiteDataStore = profile.kind == .primary ? .default() : .nonPersistent()
          '''
          new_restore = '''        let restoredURLCandidate = isPersistentProfile && shouldRestorePersistentSession
              ? browserStateVault.lastURL(
                  profileID: storageProfileID,
                  allowedHostSuffixes: provider.authenticatedHostSuffixes
              )
              : nil
          let restoredURL = provider.isAuthenticatedContentURL(restoredURLCandidate)
              ? restoredURLCandidate
              : nil
          self.initialURL = restoredURL ?? initialURL ?? provider.startURL

          let configuration = WKWebViewConfiguration()
          let usesSharedChatGPTPrimaryStore = provider.id == .chatGPT && profile.kind == .primary
          configuration.websiteDataStore = usesSharedChatGPTPrimaryStore ? .default() : .nonPersistent()
          '''
          if old_restore not in store:
              raise SystemExit("Expected restore/data-store block was not found")
          store = store.replace(old_restore, new_restore, 1)

          old_detection = '''        guard profile.kind != .guest, !didDetectDisplayName else {
              return
          }

          let displayName: String?
          '''
          new_detection = '''        guard profile.kind != .guest,
                !didDetectDisplayName,
                provider.isAuthenticatedContentURL(webView.url) else {
              return
          }

          let displayName: String?
          '''
          if old_detection not in store:
              raise SystemExit("Expected display-name detection guard was not found")
          store = store.replace(old_detection, new_detection, 1)
          store_path.write_text(store)

          provider_path = Path("ChatGPTWebView/App/AIProvider.swift")
          provider = provider_path.read_text()
          old_claude = 'unauthenticatedPathPrefixes: ["/login", "/auth", "/oauth"]'
          new_claude = 'unauthenticatedPathPrefixes: ["/login", "/auth", "/oauth", "/help", "/support"]'
          if old_claude not in provider:
              raise SystemExit("Expected Claude unauthenticated paths were not found")
          provider = provider.replace(old_claude, new_claude, 1)

          old_grok = 'loginURL: URL(string: "https://grok.com/")!'
          new_grok = 'loginURL: URL(string: "https://grok.com/sign-in")!'
          if old_grok not in provider:
              raise SystemExit("Expected Grok login URL was not found")
          provider = provider.replace(old_grok, new_grok, 1)
          provider_path.write_text(provider)

          project_path = Path("project.yml")
          project = project_path.read_text()
          old_build = 'CURRENT_PROJECT_VERSION: "26"'
          new_build = 'CURRENT_PROJECT_VERSION: "27"'
          if old_build not in project:
              raise SystemExit("Expected build 26 was not found")
          project_path.write_text(project.replace(old_build, new_build, 1))

      - name: Verify patch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -F 'let usesSharedChatGPTPrimaryStore = provider.id == .chatGPT && profile.kind == .primary' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'provider.isAuthenticatedContentURL(restoredURLCandidate)' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F 'provider.isAuthenticatedContentURL(webView.url) else' ChatGPTWebView/Web/ChatGPTWebViewStore.swift
          grep -F '"/help", "/support"' ChatGPTWebView/App/AIProvider.swift
          grep -F 'loginURL: URL(string: "https://grok.com/sign-in")!' ChatGPTWebView/App/AIProvider.swift
          grep -F 'CURRENT_PROJECT_VERSION: "27"' project.yml

      - name: Commit patch to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChatGPTWebView/Web/ChatGPTWebViewStore.swift ChatGPTWebView/App/AIProvider.swift project.yml
          git commit -m "Isolate provider authentication sessions"
          git push origin HEAD:codex/multi-ai-architecture
